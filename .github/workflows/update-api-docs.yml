name: Update API Documentation

on:
  workflow_dispatch: # Manual trigger only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-api-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required for pushing changes
      pull-requests: write  # Required for creating PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update API documentation
        run: npm run update-api-docs

      - name: Check for changes
        id: git-check
        run: |
          # Stage all changes (including new/deleted files) to detect them with git diff
          git add public/api-docs/
          git add src/tools/api-specs/schema/list-api-specs.input.schema.ts

          # Detect changes only in meaningful files (excludes oas.json and metadata.json)
          git diff --cached --exit-code -- \
            public/api-docs/index/ \
            public/api-docs/information/ \
            public/api-docs/example/ \
            src/tools/api-specs/schema/list-api-specs.input.schema.ts \
            || echo "changed=true" >> $GITHUB_OUTPUT

          # Only generate summary when there are changes
          if git diff --cached --quiet -- \
            public/api-docs/index/ \
            public/api-docs/information/ \
            public/api-docs/example/ \
            src/tools/api-specs/schema/list-api-specs.input.schema.ts; then exit 0; fi

          # File change list (meaningful changes only, excluding oas.json/metadata.json)
          CHANGE_LIST=$(git diff --cached --name-status -- public/api-docs/index/ public/api-docs/information/ public/api-docs/example/ 2>/dev/null | awk '
            $1=="A" { print "- **Added**: " $2 }
            $1=="M" { print "- **Modified**: " $2 }
            $1=="D" { print "- **Removed**: " $2 }
          ')

          # Diff stats
          DIFF_STAT=$(git diff --cached --stat -- public/api-docs/)

          # File count (for PR title)
          ADDED=$(git diff --cached --name-status -- public/api-docs/ | grep -c "^A" || true)
          MODIFIED=$(git diff --cached --name-status -- public/api-docs/ | grep -c "^M" || true)
          DELETED=$(git diff --cached --name-status -- public/api-docs/ | grep -c "^D" || true)

          # Save multi-line output to GITHUB_OUTPUT
          {
            echo "change_list<<EOF_CHANGES"
            echo "$CHANGE_LIST"
            echo "EOF_CHANGES"
            echo "diff_stat<<EOF_STAT"
            echo "$DIFF_STAT"
            echo "EOF_STAT"
            echo "added=$ADDED"
            echo "modified=$MODIFIED"
            echo "deleted=$DELETED"
          } >> $GITHUB_OUTPUT

      - name: Create branch and push changes
        if: steps.git-check.outputs.changed == 'true'
        id: create-pr
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch name with timestamp
          BRANCH_NAME="docs/api-update-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Create and switch to new branch
          git checkout -b "$BRANCH_NAME"

          # Build PR title with change counts
          ADDED="${{ steps.git-check.outputs.added }}"
          MODIFIED="${{ steps.git-check.outputs.modified }}"
          DELETED="${{ steps.git-check.outputs.deleted }}"

          TITLE_PARTS=""
          [ "$ADDED" -gt 0 ] 2>/dev/null && TITLE_PARTS="${TITLE_PARTS}${TITLE_PARTS:+, }${ADDED} added"
          [ "$MODIFIED" -gt 0 ] 2>/dev/null && TITLE_PARTS="${TITLE_PARTS}${TITLE_PARTS:+, }${MODIFIED} modified"
          [ "$DELETED" -gt 0 ] 2>/dev/null && TITLE_PARTS="${TITLE_PARTS}${TITLE_PARTS:+, }${DELETED} removed"

          if [ -n "$TITLE_PARTS" ]; then
            PR_TITLE="docs: Update API documentation ($TITLE_PARTS)"
          else
            PR_TITLE="docs: Update API documentation"
          fi

          # Commit changes (already staged in "Check for changes" step)
          git commit -m "$PR_TITLE

          Auto-generated by GitHub Actions
          Workflow: ${{ github.workflow }}
          Run: ${{ github.run_number }}"

          # Push to new branch
          git push origin "$BRANCH_NAME"

          # Build PR body
          CHANGE_LIST="${{ steps.git-check.outputs.change_list }}"
          DIFF_STAT="${{ steps.git-check.outputs.diff_stat }}"

          # Create pull request
          gh pr create \
            --title "$PR_TITLE" \
            --body "## API Documentation Update

          This PR was automatically generated by the \`Update API Documentation\` workflow.

          ### Changes
          ${CHANGE_LIST:-_No meaningful file changes detected (only metadata updated)._}

          ### Stats
          \`\`\`
          $DIFF_STAT
          \`\`\`

          **Validation:** All API documentation has been validated successfully.

          ---
          Auto-generated by [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --base main \
            --head "$BRANCH_NAME"

      - name: No changes detected
        if: steps.git-check.outputs.changed != 'true'
        run: echo "No changes detected in API documentation"
