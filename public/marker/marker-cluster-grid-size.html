      const markerCluster = new inavi.maps.MarkerClusterer(map, markers);

      map.on("click", function(e) {
        const marker = new inavi.maps.Marker({
          position: e.lngLat,
        });
        markerCluster.addMarker(marker);
      });

      document.querySelector("#gridSize").addEventListener("change", function(e) {

      });
    }
