<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>마커 이동하기</title>
    <style>
      #controls {
        margin-bottom: 10px;
        padding: 10px;
      }
      #controls button {
        margin-right: 10px;
        padding: 8px 16px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: #f0f0f0;
      }
      #controls button.active {
        background-color: #4CAF50;
        color: white;
        border-color: #4CAF50;
      }
      #map {
        width: 100%;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button id="clickBtn" class="active">클릭 모드</button>
      <button id="dragBtn">드래그 모드</button>
    </div>
    <div id="map"></div>

    <script>
    let isClickMode = true;
    let isDragMode = false;
    let marker;
    let map;

    function initMap() {
      map = new inavi.maps.Map({
        center: [127.110749, 37.402158],
        container: "map",
        zoom: 13,
      });

      marker = new inavi.maps.Marker({
        map: map,
        position: map.getCenter(),
      });

      // 클릭 모드 이벤트 핸들러
      const clickHandler = function(e) {
        marker.setPosition(e.lngLat);
      };

      // 드래그 모드 이벤트 핸들러
      const dragendHandler = function(e) {
        marker.setPosition(e.lngLat);
      };

      // 초기: 클릭 모드 활성화
      map.on("click", clickHandler);

      // 클릭 모드 버튼
      const clickBtn = document.getElementById("clickBtn");
      clickBtn.addEventListener("click", function() {
        if (!isClickMode) {
          map.on("click", clickHandler);
          isClickMode = true;
          clickBtn.classList.add("active");
        } else {
          map.off("click", clickHandler);
          isClickMode = false;
          clickBtn.classList.remove("active");
        }
      });

      // 드래그 모드 버튼
      const dragBtn = document.getElementById("dragBtn");
      dragBtn.addEventListener("click", function() {
        if (!isDragMode) {
          marker.setDraggable(true);
          marker.on('dragend', dragendHandler);
          isDragMode = true;
          dragBtn.classList.add("active");
        } else {
          marker.setDraggable(false);
          marker.off('dragend', dragendHandler);
          isDragMode = false;
          dragBtn.classList.remove("active");
        }
      });
    }
    </script>
    <script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
  </body>
</html>
