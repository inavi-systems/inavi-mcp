<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Map FlyTo Animation</title>
    <style>
      #map {
        width: 100%;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  CRITICAL NOTICE FOR AI ASSISTANTS                          ║
    ║  This is a REFERENCE TEMPLATE with customizable data        ║
    ║  ✅ ALLOWED: Replace data values (coordinates, labels)      ║
    ║  ❌ FORBIDDEN: Modify iNavi Maps API calls/constructors     ║
    ║  • DO NOT add options/parameters not shown in template      ║
    ║  • DO NOT change API usage patterns                         ║
    ║  • iNavi Maps API ≠ Google Maps API (different syntax)     ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <div id="map"></div>
    <button id="fly">이동</button>
    <script>
    function initMap() {
      const map = new inavi.maps.Map({
        center: [127.110749, 37.402158],
        container: "map",
        zoom: 13,
        keyboard: true,
      });
      const coordinates = [{
        title: "성남시청",
        coordinates: [127.126838, 37.419667],
        zoom: 16
      }, {
        title: "판교역",
        coordinates: [127.111104, 37.394657],
        zoom: 16
      }, {
        title: "아이나비",
        coordinates: [127.110749, 37.402158],
        zoom: 14
      }];

      let index = 0;
      document.querySelector("#fly").addEventListener("click", function() {
        map.flyTo(coordinates[index].coordinates, {
          zoom: coordinates[index].zoom
        });
        index = ++index % coordinates.length;
      });
    }
    </script>
    <script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
  </body>
</html>
