<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>지도 정보 표현하기</title>
    <style>
      #map {
        width: 100%;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  CRITICAL NOTICE FOR AI ASSISTANTS                          ║
    ║  This is a REFERENCE TEMPLATE with customizable data        ║
    ║  ✅ ALLOWED: Replace data values (coordinates, labels)      ║
    ║  ❌ FORBIDDEN: Modify iNavi Maps API calls/constructors     ║
    ║  • DO NOT add options/parameters not shown in template      ║
    ║  • DO NOT change API usage patterns                         ║
    ║  • iNavi Maps API ≠ Google Maps API (different syntax)     ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <div id="map"></div>
    <button id="information"> 지도 정보 얻어 오기 </button>
    <p>현재 레벨 : <span id="level">' '</span></p>
    <p>중심 좌표 : <span id="center">[ ]</span></p>
    <p>영역 정보 : <span id="bounds">{ }</span></p>
    <script>
      function initMap() {
        const map = new inavi.maps.Map({
          center: [127.110749, 37.402158],
          container: "map",
          zoom: 13,
        });

        document.querySelector("#information").addEventListener("click", function() {
          const level = document.querySelector("#level");
          const center = document.querySelector("#center");
          const bounds = document.querySelector("#bounds");
          level.innerText =  map.getZoom();
          center.innerText =  '[' + map.getCenter().lng + ', ' + map.getCenter().lat + ']';
          bounds.innerText =  '{' + 'south : ' + map.getBounds().south + ', ' + 'west : ' + map.getBounds().west
 + ',' + 'north : ' + map.getBounds().north + ','  + 'east : ' + map.getBounds().east + '}';
        });
      }
    </script>
    <script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
  </body>
</html>
