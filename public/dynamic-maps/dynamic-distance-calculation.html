<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>지점 간 거리 계산</title>
  <style>
    #map {
      width: 100%;
      height: 500px;
    }
    .controls {
      margin: 10px 0;
    }
    button {
      padding: 8px 16px;
      margin-right: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .info {
      margin: 10px 0;
      font-size: 16px;
      font-weight: bold;
    }
    .instruction {
      margin: 10px 0;
      color: #666;
    }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@5.1.6/turf.min.js"></script>
<div class="instruction">📍 지도를 클릭하여 두 지점을 선택하세요</div>
<div id="map"></div>
<div class="controls">
  <button id="calcButton" disabled>거리 계산하기</button>
  <button id="resetButton">초기화</button>
</div>
<div class="info">두 지점 간의 거리: <span id="calc_span">-</span></div>
<script>
  function initMap() {
    const map = new inavi.maps.Map({
      center: [127.110749, 37.402158],
      container: "map",
      zoom: 13,
    });

    // 상태 관리
    let markers = [];
    let polyline = null;
    let label = null;

    // 두 지점 간의 거리 계산 함수 (Turf.js 사용)
    const calculateDistance = (pos1, pos2) => {
      const from = turf.point([pos1.lng, pos1.lat]);
      const to = turf.point([pos2.lng, pos2.lat]);
      const distanceKm = turf.distance(from, to, { units: "kilometers" });
      return Number(distanceKm.toFixed(3)) + 'km';
    };

    // 모든 요소 초기화
    const clearAll = () => {
      // 마커 제거
      markers.forEach(marker => marker.setMap(null));
      markers = [];

      // 폴리라인 제거
      if (polyline) {
        polyline.setMap(null);
        polyline = null;
      }

      // 라벨 제거
      if (label) {
        label.setMap(null);
        label = null;
      }

      // UI 업데이트
      document.querySelector("#calc_span").innerText = "-";
      document.querySelector("#calcButton").disabled = true;
    };

    // 계산 결과만 초기화 (마커는 유지)
    const clearResult = () => {
      // 폴리라인 제거
      if (polyline) {
        polyline.setMap(null);
        polyline = null;
      }

      // 라벨 제거
      if (label) {
        label.setMap(null);
        label = null;
      }

      document.querySelector("#calc_span").innerText = "-";
    };

    map.on("click", (e) => {
      if (markers.length >= 2) {
        clearAll();
      }

      clearResult();

      const marker = new inavi.maps.Marker({
        map: map,
        position: e.lngLat,
      });
      markers.push(marker);

      if (markers.length === 2) {
        document.querySelector("#calcButton").disabled = false;
      }
    });

    // 계산 버튼 클릭 이벤트
    document.querySelector("#calcButton").addEventListener("click", function() {
      if (markers.length !== 2) return;

      const pos1 = markers[0].getPosition();
      const pos2 = markers[1].getPosition();

      // 폴리라인 그리기
      polyline = new inavi.maps.Polyline({
        map: map,
        path: [pos1, pos2],
        style: {
          lineColor: "#e72141",
          lineWidth: 5,
          lineDasharray: [1, 0],
        },
      });

      // 거리 계산
      const distance = calculateDistance(pos1, pos2);

      // 라벨 표시 (두 지점의 중간 지점)
      const centerLng = (pos1.lng + pos2.lng) / 2;
      const centerLat = (pos1.lat + pos2.lat) / 2;

      label = new inavi.maps.Label({
        map: map,
        position: [centerLng, centerLat],
        text: distance,
        style: {
          textColor: "#FFF",
          textOpacity: 1,
          textHaloColor: "#e72141",
          textHaloWidth: 2,
        },
      });

      // 거리 텍스트 표시
      document.querySelector("#calc_span").innerText = distance;
    });

    // 초기화 버튼 클릭 이벤트
    document.querySelector("#resetButton").addEventListener("click", function() {
      clearAll();
    });
  }
</script>
<script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
</body>
</html>
