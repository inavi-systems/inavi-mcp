<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>지도 유형 설정하기</title>
    <style>
      #map {
        width: 100%;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  CRITICAL NOTICE FOR AI ASSISTANTS                          ║
    ║  This is a REFERENCE TEMPLATE with customizable data        ║
    ║  ✅ ALLOWED: Replace data values (coordinates, labels)      ║
    ║  ❌ FORBIDDEN: Modify iNavi Maps API calls/constructors     ║
    ║  • DO NOT add options/parameters not shown in template      ║
    ║  • DO NOT change API usage patterns                         ║
    ║  • iNavi Maps API ≠ Google Maps API (different syntax)     ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <div id="map"></div>
    <script>
      function initMap() {
        const map = new inavi.maps.Map({
          center: [127.110749, 37.402158],
          container: 'map',
          zoom: 13,
        });

        const mapStyleBtnsConst = [
          {
            id: 'normal_btn',
            title: '일반 지도',
            type: 'https://timbase.inavi.com/resources/web/inavi_5595128678a34daabf6dc772dad1e7e4.json',
          },
          {
            id: 'satellite_btn',
            title: '항공 지도',
            type: 'https://timbase.inavi.com/resources/web/type/S9f2K8mQ1r6Z4xB3nH7jL5pW2vR9dT3u.json',
          },
          {
            id: 'hybrid_btn',
            title: '하이브리드 지도',
            type: 'https://timbase.inavi.com/resources/web/type/H32sateghkqwlxptzyrjdbvmcdfinavi.json',
          },
          {
            id: 'dem_normal_btn',
            title: '일반 지형 지도',
            type: 'https://timbase.inavi.com/resources/web/type/inavi_DNK9f7D8k34lQ8sNfB2jM6xT5rH0uQ3y1bZ4.json',
          },
          {
            id: 'dem_hybrid_btn',
            title: '하이브리드 지형 지도',
            type: 'https://timbase.inavi.com/resources/web/type/H32sateghkqwlxptzyrjdbvmcdfinavi.json',
          },
        ];
        // 버튼 요소 생성 및 추가
        mapStyleBtnsConst.forEach((btn) => {
          const button = document.createElement('button');
          button.id = btn.id;
          button.innerText = btn.title;
          document.body.appendChild(button);

          // 버튼 클릭 시 지도 스타일 변경
          button.addEventListener('click', () => {
            map.setStyle(btn.type);
          });
        });
      }
    </script>
    <script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
  </body>
</html>
