<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>원 생성하기</title>
    <style>
      #map {
        width: 100%;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  CRITICAL NOTICE FOR AI ASSISTANTS                          ║
    ║  This is a REFERENCE TEMPLATE with customizable data        ║
    ║  ✅ ALLOWED: Replace data values (coordinates, radius,      ║
    ║              colors, opacity)                                ║
    ║  ❌ FORBIDDEN: Modify iNavi Maps API calls/constructors     ║
    ║  • DO NOT add options/parameters not shown in template      ║
    ║  • DO NOT change API usage patterns                         ║
    ║  • iNavi Maps API ≠ Google Maps API (different syntax)     ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <div id="map"></div>

    <script>
    function initMap() {
      const map = new inavi.maps.Map({
        center: [127.110749, 37.402158],
        container: "map",
        zoom: 13,
      });

      const circle = new inavi.maps.Circle({
        map: map,
        position: [127.110749, 37.402158],
        radius: 0.5, // unit: km (0.5km = 500m)
        style: {
          fillOpacity: 0.7,
          fillColor: "#F20554",
          fillOutlineColor: "#DB4455",
        },
      });
    }
    </script>
    <script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
  </body>
</html>
