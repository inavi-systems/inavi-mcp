<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>도형 스타일 설정하기</title>
    <style>
      #map {
        width: 100%;
        height: 500px;
      }
      .controls {
        margin-top: 10px;
      }
      .controls label {
        margin-right: 5px;
      }
      .controls input {
        margin-right: 15px;
      }
    </style>
  </head>
  <body>
    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  CRITICAL NOTICE FOR AI ASSISTANTS                          ║
    ║  This is a REFERENCE TEMPLATE with customizable data        ║
    ║  ✅ ALLOWED: Replace data values (coordinates, colors,      ║
    ║              opacity, path points)                           ║
    ║  ❌ FORBIDDEN: Modify iNavi Maps API calls/constructors     ║
    ║  • DO NOT add options/parameters not shown in template      ║
    ║  • DO NOT change API usage patterns                         ║
    ║  • iNavi Maps API ≠ Google Maps API (different syntax)     ║
    ║                                                              ║
    ║  NOTE: setStyle() works identically for Circle, Polygon,    ║
    ║        and Multi-Polygon shapes.                             ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <div id="map"></div>
    <div class="controls">
      <label for="circleColor">Circle Color:</label>
      <input id="circleColor" type="color" value="#F20554">
      <label for="polygonColor">Polygon Color:</label>
      <input id="polygonColor" type="color" value="#4772F9">
    </div>

    <script>
    function initMap() {
      const map = new inavi.maps.Map({
        center: [127.097230, 37.407298],
        container: "map",
        zoom: 14,
      });

      // Circle with customizable style
      const circle = new inavi.maps.Circle({
        map: map,
        position: [127.110749, 37.402158],
        radius: 0.5,
        style: {
          fillOpacity: 0.7,
          fillColor: "#F20554",
          fillOutlineColor: "#DB4455",
        },
      });

      // Dynamically change circle style using setStyle()
      document.querySelector("#circleColor").addEventListener("change", function(e) {
        circle.setStyle({
          fillOpacity: 0.7,
          fillColor: e.target.value,
          fillOutlineColor: e.target.value,
        });
      });

      // Polygon with customizable style
      const polygon = new inavi.maps.Polygon({
        map: map,
        path: [
          [127.083712, 37.410439],
          [127.097960, 37.410439],
          [127.097960, 37.404371],
          [127.083712, 37.404371],
          [127.083712, 37.410439],
        ],
        style: {
          fillOpacity: 0.8,
          fillColor: "#4772F9",
          fillOutlineColor: "#031B80",
        },
      });

      // Dynamically change polygon style using setStyle()
      document.querySelector("#polygonColor").addEventListener("change", function(e) {
        polygon.setStyle({
          fillOpacity: 0.8,
          fillColor: e.target.value,
          fillOutlineColor: e.target.value,
        });
      });
    }
    </script>
    <script type="text/javascript" src="{base_url}/appkeys/{appKey}/maps?callback=initMap"></script>
  </body>
</html>
